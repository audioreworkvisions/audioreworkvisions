<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bild Generator - AUDIOREWORKVISIONS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="f.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Starfield background container -->
    <div id="starfield-container"></div>
    
    <header>
        <nav class="breadcrumb">
            <a href="index.html">HOME</a> > <a href="image-generator.html">BILD GENERATOR</a>
        </nav>
        <img src="assets/images/user-icon.png" alt="AUDIOREWORKVISIONS Logo" class="logo">
        <h1 class="glitch-text">AI BILD GENERATOR</h1>
    </header>
    
    <main>
        <div class="container">
            <section class="section">
                <div class="profile-container">
                    <div id="login-section">
                        <button id="login-button" onclick="showLogin()">Anmelden</button>
                        <div id="login-form" style="display: none;">
                            <input type="text" id="username-input" placeholder="Benutzername">
                            <button onclick="login()">Bestätigen</button>
                        </div>
                        <div id="profile" style="display: none;">
                            <span id="username">Benutzer</span>
                            <button onclick="logout()">Abmelden</button>
                        </div>
                    </div>
                </div>
                
                <div class="image-generator-container">
                    <div class="input-container">
                        <input type="text" id="prompt" placeholder="Beschreiben Sie das gewünschte Bild...">
                        <button onclick="generateImage()">Bild Generieren</button>
                        <button id="save-prompt-button" onclick="savePrompt()">Prompt Speichern</button>
                    </div>
                    
                    <div id="generated-image-container" class="generated-image-container">
                        <p>Generierte Bilder erscheinen hier...</p>
                    </div>
                    
                    <div class="gallery-container">
                        <h3>Bild Galerie</h3>
                        <div id="gallery-list" class="gallery-list"></div>
                    </div>
                    
                    <div class="saved-prompts-container">
                        <h3>Gespeicherte Prompts</h3>
                        <div id="saved-prompts" class="saved-prompts"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2025 AUDIOREWORKVISIONS. All rights reserved.</p>
    </footer>
    
    <!-- Three.js library -->
    <script src="assets/js/three.min.js"></script>
    <!-- Starfield animation -->
    <script src="assets/js/starfield.js"></script>
    <!-- Image generator functionality -->
    <script src="assets/js/image-generator.js"></script>
    
    <script>
        // Page transition effect
        document.addEventListener('DOMContentLoaded', function() {
            const links = document.querySelectorAll('a');
            
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    if (this.href !== window.location.href && !this.getAttribute('target')) {
                        e.preventDefault();
                        document.body.style.opacity = '0';
                        document.body.style.transition = 'opacity 0.5s';
                        
                        setTimeout(() => {
                            window.location.href = this.href;
                        }, 500);
                    }
                });
            });
        });
    </script>
</body>
</html>
