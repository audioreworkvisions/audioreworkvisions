<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - AUDIOREWORKVISIONS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="f.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Starfield background container -->
    <div id="starfield-container"></div>
    
    <header>
        <nav class="breadcrumb">
            <a href="index.html">HOME</a> > <a href="chat.html">AI CHAT</a>
        </nav>
        <img src="assets/images/user-icon.png" alt="AUDIOREWORKVISIONS Logo" class="logo">
        <h1 class="glitch-text">AI CHAT INTERFACE</h1>
    </header>
    
    <main>
        <div class="container">
            <section class="section">
                <div class="chat-container">
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="chat-input-container">
                        <input type="text" id="chat-input" placeholder="Geben Sie Ihre Nachricht ein..." />
                        <button id="send-button" onclick="sendMessage()">Senden</button>
                        <button id="clear-button" onclick="clearChat()">Löschen</button>
                    </div>
                </div>
            </section>
            
            <section class="section">
                <h2 class="glitch-text">CHAT EINSTELLUNGEN</h2>
                <div class="settings-container">
                    <div class="setting-item">
                        <label for="model-select">AI Modell:</label>
                        <select id="model-select">
                            <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                            <option value="gpt-4">GPT-4</option>
                            <option value="gpt-4-turbo">GPT-4 Turbo</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="temperature-slider">Kreativität (Temperature):</label>
                        <input type="range" id="temperature-slider" min="0" max="1" step="0.1" value="0.7">
                        <span id="temperature-value">0.7</span>
                    </div>
                    <div class="setting-item">
                        <label for="max-tokens-input">Max Tokens:</label>
                        <input type="number" id="max-tokens-input" min="1" max="4000" value="1000">
                    </div>
                </div>
            </section>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2025 AUDIOREWORKVISIONS. All rights reserved.</p>
    </footer>
    
    <!-- Three.js library -->
    <script src="assets/js/three.min.js"></script>
    <!-- Starfield animation -->
    <script src="assets/js/starfield.js"></script>
    <!-- Chat functionality -->
    <script src="assets/js/chat.js"></script>
    
    <script>
        // Page transition effect
        document.addEventListener('DOMContentLoaded', function() {
            const links = document.querySelectorAll('a');
            
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    if (this.href !== window.location.href && !this.getAttribute('target')) {
                        e.preventDefault();
                        document.body.style.opacity = '0';
                        document.body.style.transition = 'opacity 0.5s';
                        
                        setTimeout(() => {
                            window.location.href = this.href;
                        }, 500);
                    }
                });
            });
        });
    </script>
</body>
</html>
